# Deployment stack for another machine. For local dev you typically point the API
# at your already-running Ollama/Qdrant instead of these containers.
services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333" # REST
      - "6334:6334" # gRPC
    volumes:
      - qdrant-data:/qdrant/storage

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - ollama
      - qdrant
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - Ollama__Url=http://ollama:11434/
      - Ollama__ChatModel=qwen2.5   # TODO: pin the chosen small model
      - Ollama__EmbedModel=bge-m3
      - Qdrant__Url=http://qdrant:6334
      - BlobStore__Root=/data/blobs
    volumes:
      - blob-data:/data/blobs

volumes:
  ollama-models:
  qdrant-data:
  blob-data:
